# Woodpecker CI - Node.js (Codex Power Pack)
#
# Uses Makefile targets as steps for consistency with local dev.
# Run locally: woodpecker exec
# Docs: https://woodpecker-ci.org/docs/usage/pipeline-syntax

when:
  branch: [main]
  event: [push, pull_request]

steps:
  - name: lint
    image: node:22
    commands:
      - npm ci
      - make lint

  - name: test
    image: node:22
    commands:
      - npm ci
      - make test

  - name: typecheck
    image: node:22
    commands:
      - npm ci
      - make typecheck
