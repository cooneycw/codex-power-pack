# GitHub Actions CI - Rust (Codex Power Pack)
#
# Uses Makefile targets as steps for consistency with local dev.
# Customize matrix, caching, and deploy steps as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
