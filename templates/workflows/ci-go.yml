# GitHub Actions CI - Go (Codex Power Pack)
#
# Uses Makefile targets as steps for consistency with local dev.
# Customize matrix, caching, and deploy steps as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}

      - name: Install dependencies
        run: go mod download

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Vet
        run: make vet
