# GitHub Actions CI - Python (Codex Power Pack)
#
# Uses Makefile targets as steps for consistency with local dev.
# Customize matrix, caching, and deploy steps as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Typecheck
        run: make typecheck
