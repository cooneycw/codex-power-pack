# Codex Power Pack - MCP Server Orchestration
# Usage (prefer Makefile targets - see Deployment Conventions in AGENTS.md):
#   make docker-up PROFILE=core                      # Second Opinion + Nano-Banana
#   make docker-up PROFILE="core browser"            # + Playwright
#   make docker-up PROFILE="core cicd"               # + Woodpecker CI
#   make docker-build PROFILE=core                   # Build images only
#   make docker-down                                 # Stop all services
#   make docker-ps                                   # Show container status
#
# Secrets: Create a root .env file with API keys (never commit this):
#   GEMINI_API_KEY=...
#   OPENAI_API_KEY=...
#   ANTHROPIC_API_KEY=...
#   AWS_SECRET_NAME=codex-power-pack
#   AWS_REGION=us-east-1
#   WOODPECKER_URL=...          (optional local override)
#   WOODPECKER_API_TOKEN=...    (optional local override)

services:
  codex-second-opinion:
    build:
      context: ./codex-second-opinion
      dockerfile: deploy/Dockerfile
    image: codex-second-opinion:latest
    container_name: codex-second-opinion
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - AWS_SECRET_NAME=${AWS_SECRET_NAME:-codex-power-pack}
      - AWS_API_KEYS_SECRET_NAME=${AWS_API_KEYS_SECRET_NAME:-codex_llm_apikeys}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  codex-nano-banana:
    build:
      context: ./codex-nano-banana
      dockerfile: deploy/Dockerfile
    image: codex-nano-banana:latest
    container_name: codex-nano-banana
    ports:
      - "8084:8084"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  codex-woodpecker:
    build:
      context: ./codex-woodpecker
      dockerfile: deploy/Dockerfile
    image: codex-woodpecker:latest
    container_name: codex-woodpecker
    ports:
      - "8085:8085"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - AWS_SECRET_NAME=${AWS_SECRET_NAME:-codex-power-pack}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["cicd"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  codex-playwright:
    build:
      context: ./codex-playwright
      dockerfile: deploy/Dockerfile
    image: codex-playwright:latest
    container_name: codex-playwright
    ports:
      - "8081:8081"
    shm_size: "2gb"
    environment:
      - SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles: ["browser"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  default:
    name: codex-mcp-net
