# Codex Power Pack - MCP Server Orchestration
# Usage (prefer Makefile targets - see Deployment Conventions in AGENTS.md):
#   make docker-up PROFILE=core                      # Second Opinion + Nano-Banana
#   make docker-up PROFILE="core browser"            # + Playwright
#   make docker-up PROFILE="core legacy-cicd"        # + legacy Woodpecker CI container
#   make docker-build PROFILE=core                   # Build images only
#   make docker-down                                 # Stop all services
#   make docker-ps                                   # Show container status
#
# Secrets: Create a root .env file with AWS metadata and sidecar auth (never commit real values):
#   AWS_SECRET_NAME=codex-power-pack
#   AWS_API_KEYS_SECRET_NAME=codex_llm_apikeys
#   AWS_REGION=us-east-1
#   AWS_SECRETSMANAGER_TOKEN=change-me-sidecar-token
#   AWS_ACCESS_KEY_ID=...       (if no IAM role/profile or ~/.aws credentials are available)
#   AWS_SECRET_ACCESS_KEY=...
#   AWS_SESSION_TOKEN=...
#   AWS_PROFILE=default         (optional; defaults to "default" when ~/.aws is mounted)
#
# Optional native/local overrides:
#   GEMINI_API_KEY=...
#   OPENAI_API_KEY=...
#   ANTHROPIC_API_KEY=...
#   WOODPECKER_URL=...
#   WOODPECKER_API_TOKEN=...

services:
  codex-second-opinion:
    build:
      context: ./codex-second-opinion
      dockerfile: deploy/Dockerfile
    image: codex-second-opinion:latest
    container_name: codex-second-opinion
    ports:
      - "9100:9100"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=9100
      - AWS_SECRET_SOURCE=aws-secretsmanager-agent
      - AWS_SECRETSMANAGER_AGENT_ENDPOINT=http://127.0.0.1:2773
      - AWS_SECRETSMANAGER_AGENT_ATTEMPTS=${AWS_SECRETSMANAGER_AGENT_ATTEMPTS:-30}
      - AWS_SECRETSMANAGER_AGENT_RETRY_DELAY=${AWS_SECRETSMANAGER_AGENT_RETRY_DELAY:-1}
      - AWS_SECRETSMANAGER_TOKEN=${AWS_SECRETSMANAGER_TOKEN:-codex-local-sidecar-token}
      - AWS_SECRET_NAME=${AWS_SECRET_NAME:-codex-power-pack}
      - AWS_API_KEYS_SECRET_NAME=${AWS_API_KEYS_SECRET_NAME:-codex_llm_apikeys}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  codex-second-opinion-secrets:
    build:
      context: ./aws-secretsmanager-agent
      dockerfile: Dockerfile
      args:
        AWS_SECRETSMANAGER_AGENT_VERSION: ${AWS_SECRETSMANAGER_AGENT_VERSION:-v2.0.0}
    image: codex-aws-secretsmanager-agent:latest
    container_name: codex-second-opinion-secrets
    network_mode: "service:codex-second-opinion"
    depends_on:
      - codex-second-opinion
    environment:
      - HOME=/root
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_SDK_LOAD_CONFIG=1
      - AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      - AWS_CONFIG_FILE=/root/.aws/config
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_TOKEN=${AWS_SECRETSMANAGER_TOKEN:-codex-local-sidecar-token}
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    restart: unless-stopped
    profiles: ["core"]

  codex-nano-banana:
    build:
      context: ./codex-nano-banana
      dockerfile: deploy/Dockerfile
    image: codex-nano-banana:latest
    container_name: codex-nano-banana
    ports:
      - "9102:9102"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=9102
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9102/')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  codex-woodpecker:
    build:
      context: ./codex-woodpecker
      dockerfile: deploy/Dockerfile
    image: codex-woodpecker:latest
    container_name: codex-woodpecker
    ports:
      - "9103:9103"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=9103
      - AWS_SECRET_SOURCE=aws-secretsmanager-agent
      - AWS_SECRETSMANAGER_AGENT_ENDPOINT=http://127.0.0.1:2773
      - AWS_SECRETSMANAGER_AGENT_ATTEMPTS=${AWS_SECRETSMANAGER_AGENT_ATTEMPTS:-30}
      - AWS_SECRETSMANAGER_AGENT_RETRY_DELAY=${AWS_SECRETSMANAGER_AGENT_RETRY_DELAY:-1}
      - AWS_SECRETSMANAGER_TOKEN=${AWS_SECRETSMANAGER_TOKEN:-codex-local-sidecar-token}
      - AWS_SECRET_NAME=${AWS_SECRET_NAME:-codex-power-pack}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9103/')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    # Legacy-only container profile. Primary Codex usage is stdio transport.
    profiles: ["legacy-cicd"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  codex-woodpecker-secrets:
    build:
      context: ./aws-secretsmanager-agent
      dockerfile: Dockerfile
      args:
        AWS_SECRETSMANAGER_AGENT_VERSION: ${AWS_SECRETSMANAGER_AGENT_VERSION:-v2.0.0}
    image: codex-aws-secretsmanager-agent:latest
    container_name: codex-woodpecker-secrets
    network_mode: "service:codex-woodpecker"
    depends_on:
      - codex-woodpecker
    environment:
      - HOME=/root
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_SDK_LOAD_CONFIG=1
      - AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      - AWS_CONFIG_FILE=/root/.aws/config
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_TOKEN=${AWS_SECRETSMANAGER_TOKEN:-codex-local-sidecar-token}
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    restart: unless-stopped
    # Legacy-only container profile. Primary Codex usage is stdio transport.
    profiles: ["legacy-cicd"]

  codex-playwright:
    build:
      context: ./codex-playwright
      dockerfile: deploy/Dockerfile
    image: codex-playwright:latest
    container_name: codex-playwright
    ports:
      - "9101:9101"
    shm_size: "2gb"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9101
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9101/')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles: ["browser"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  default:
    name: codex-mcp-net
