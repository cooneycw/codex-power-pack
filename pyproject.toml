[project]
name = "codex-power-pack"
version = "5.2.0"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["mypy>=1.10", "pydantic>=2.0", "pytest>=8.0", "pyyaml>=6.0", "ruff>=0.4", "types-PyYAML>=6.0", "types-requests>=2.31"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = "."
disable_error_code = ["var-annotated", "assignment", "arg-type", "attr-defined"]
# .codex/skills/ is generated from claude-power-pack (codex-power-pack#75): its
# bundled helper scripts are byte-identical CPP copies with duplicate basenames
# across skill dirs (e.g. c4-mermaid.py), which collide under `mypy .`. Packaged
# plugin skill copies mirror that generated surface and add only agents/openai.yaml
# metadata. vendor/ holds only the pin + drift manifest. None are ours to type-check.
exclude = ['^\.codex/skills/', '^plugins/[^/]+/skills/', '^vendor/']

[tool.ruff]
target-version = "py311"
line-length = 120
# See the mypy note above: do not lint the vendored/generated Codex-skill copies.
extend-exclude = [".codex/skills", "plugins/*/skills", "vendor"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
