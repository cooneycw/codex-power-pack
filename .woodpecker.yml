# Codex Power Pack - Woodpecker CI Pipeline
# Purpose:
# - run the same verification entrypoint used locally
# - dry-run Docker builds only for changed MCP services
# - deploy MCP services only from main when service-level files changed

when:
  - event: [push, pull_request]

steps:
  validate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    commands:
      - apt-get update && apt-get install -y --no-install-recommends make > /dev/null 2>&1
      - uv sync --extra dev --frozen
      - make verify

  build-second-opinion:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-second-opinion
      dockerfile: codex-second-opinion/deploy/Dockerfile
      context: codex-second-opinion
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-second-opinion/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  build-playwright:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-playwright
      dockerfile: codex-playwright/deploy/Dockerfile
      context: codex-playwright
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-playwright/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  build-nano-banana:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-nano-banana
      dockerfile: codex-nano-banana/deploy/Dockerfile
      context: codex-nano-banana
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-nano-banana/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  build-woodpecker-ci:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-woodpecker
      dockerfile: codex-woodpecker/deploy/Dockerfile
      context: codex-woodpecker
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-woodpecker/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  # mcp-evaluate removed - deprecated, absorbed into /evaluate:issue skill

  deploy-mcp:
    image: docker:27-cli
    commands:
      - echo "Deploying MCP containers from main..."
      - docker compose version
      - docker compose --profile core --profile browser --profile cicd up -d --build --wait
      - docker compose --profile core --profile browser --profile cicd ps
      - docker image prune -f
      - echo "Deploy complete."
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      - event: push
        branch: main
        path:
          - "codex-second-opinion/**"
          - "codex-playwright/**"
          - "codex-nano-banana/**"
          - "codex-woodpecker/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"
