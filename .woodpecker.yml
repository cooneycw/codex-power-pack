# Codex Power Pack - Woodpecker CI Pipeline
# Purpose:
# - run the same verification entrypoint used locally
# - scan dependencies and local Python helper libraries

when:
  - event: [push, pull_request]

steps:
  validate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    commands:
      - uv sync --extra dev --frozen
      - uv run --extra dev ruff check .
      - uv run --extra dev pytest
      - uv run --extra dev mypy .
      # Drift gate: .codex/skills/ must match the pinned claude-power-pack copy
      # (codex-power-pack#75). Git-free, so it runs in this container.
      - uv run python scripts/codex_skills_sync.py --check
      # Harness gate: generated/authored skills must not carry unadapted
      # Claude-only constructs into Codex.
      - uv run python scripts/harness_lint.py --check

  secret-scan:
    image: zricethezav/gitleaks:v8.18.4
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --verbose

  dependency-audit:
    image: python:3.11-slim-bookworm
    commands:
      - pip install --quiet uv pip-audit bandit
      - uv export --format requirements-txt --no-hashes > /tmp/requirements.txt
      - pip-audit -r /tmp/requirements.txt
      - bandit -r lib scripts -ll --quiet --skip B104,B108,B310,B602
