# Codex Power Pack - Woodpecker CI Pipeline
# Purpose:
# - run the same verification entrypoint used locally
# - dry-run Docker builds only for changed MCP services
# - deploy MCP services only from main when service-level files changed

when:
  - event: [push, pull_request]

steps:
  validate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    commands:
      - uv sync --extra dev --frozen
      - uv run --extra dev ruff check .
      - uv run --extra dev pytest
      - uv run --extra dev mypy .

  secret-scan:
    image: zricethezav/gitleaks:v8.18.4
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --verbose

  dependency-audit:
    image: python:3.11-slim-bookworm
    commands:
      - pip install --quiet uv pip-audit bandit
      - uv export --format requirements-txt --no-hashes > /tmp/requirements.txt
      - pip-audit -r /tmp/requirements.txt
      - bandit -r codex-second-opinion/src codex-nano-banana/src codex-playwright/src lib/ -ll --quiet

  deploy-entrypoint-check:
    image: docker:27-cli
    commands:
      - PROFILE="core browser" ./scripts/deploy_mcp.sh --check
    when:
      - event: [push, pull_request]
        path:
          - "codex-second-opinion/**"
          - "codex-playwright/**"
          - "codex-nano-banana/**"
          - "docker-compose.yml"
          - "Makefile"
          - "scripts/deploy_mcp.sh"
          - "scripts/deploy_doctor.py"
          - ".woodpecker.yml"

  build-second-opinion:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-second-opinion
      dockerfile: codex-second-opinion/deploy/Dockerfile
      context: codex-second-opinion
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-second-opinion/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  build-playwright:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-playwright
      dockerfile: codex-playwright/deploy/Dockerfile
      context: codex-playwright
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-playwright/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  build-nano-banana:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: codex-nano-banana
      dockerfile: codex-nano-banana/deploy/Dockerfile
      context: codex-nano-banana
      tags: latest
      dry_run: true
    when:
      - event: [push, pull_request]
        path:
          - "codex-nano-banana/**"
          - "docker-compose.yml"
          - ".woodpecker.yml"

  # mcp-evaluate removed - deprecated, absorbed into /evaluate:issue skill

  deploy-mcp:
    image: docker:27-cli
    commands:
      - apk add --no-cache make python3
      - echo "Deploying MCP containers from main..."
      - UV_RUN_PYTHON=python3 PROFILE="core browser" make deploy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      - event: push
        branch: main
        path:
          - "codex-second-opinion/**"
          - "codex-playwright/**"
          - "codex-nano-banana/**"
          - "docker-compose.yml"
          - "Makefile"
          - "scripts/deploy_mcp.sh"
          - "scripts/deploy_doctor.py"
          - ".woodpecker.yml"
